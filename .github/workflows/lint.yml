---
name: Lint
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  shellcheck-and-makefile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: hynek/setup-cached-uv@0b9e52652c2d5d4fb6af4598efa3d14e60e934d1  # v2.4.0
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@latest
      - name: Install checkmake
        run: go install github.com/checkmake/checkmake/cmd/checkmake@latest
      - name: Lint GitHub Actions workflows (actionlint + shellcheck)
        run: make shellcheck
      - name: Lint Makefile (checkmake)
        run: make makefile-lint
