[minphony]
# Disabled: we don't enforce conventional all/clean/test targets; all are declared
# in a block .PHONY which checkmake can't parse
required=

[maxbodylength]
# Allow up to 10 lines per target body
maxBodyLength=10

[phonydeclared]
# We use a single block .PHONY declaration which checkmake doesn't recognise
disabled=true
